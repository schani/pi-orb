# Local development services (DESIGN.md §17): PostgreSQL plus the shared
# Docker network that orb containers join. The control plane and web UI run
# on the host during development:
#   docker compose up -d
#   npm run dev --workspace @pi-orb/control-plane
#   npm run dev --workspace @pi-orb/web
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pi-orb
      POSTGRES_PASSWORD: pi-orb
      POSTGRES_DB: pi_orb
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pi-orb-postgres:/var/lib/postgresql/data

networks:
  default:
    name: pi-orb

volumes:
  pi-orb-postgres:
